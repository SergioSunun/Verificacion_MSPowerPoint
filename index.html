<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cuestionario PowerPoint 365 – Jasperactive</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Baloo+2:wght@700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --red:        #e8402a;
    --red-dark:   #c0321e;
    --red-light:  #f06048;
    --salmon:     #f7876e;
    --cream:      #fff8f5;
    --white:      #ffffff;
    --green:      #2ec97a;
    --green-bg:   #d4f5e5;
    --wrong:      #ff4d4d;
    --wrong-bg:   #ffe0e0;
    --yellow:     #ffd140;
    --text:       #1a1a2e;
    --muted:      #7a6e6a;
    --shadow:     0 4px 24px rgba(232,64,42,0.13);
    --radius:     14px;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Nunito', sans-serif;
    background: var(--cream);
    color: var(--text);
    min-height: 100vh;
  }

  /* ─── HEADER ─── */
  header {
    background: linear-gradient(135deg, var(--red-dark) 0%, var(--red) 55%, var(--red-light) 100%);
    color: var(--white);
    padding: 32px 24px 28px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  header::before {
    content: '';
    position: absolute; inset: 0;
    background: repeating-linear-gradient(
      -45deg,
      transparent,
      transparent 18px,
      rgba(255,255,255,.04) 18px,
      rgba(255,255,255,.04) 36px
    );
  }
  header .badge {
    display: inline-block;
    background: rgba(255,255,255,.18);
    border: 1.5px solid rgba(255,255,255,.35);
    border-radius: 30px;
    font-size: .75rem;
    font-weight: 800;
    letter-spacing: .12em;
    text-transform: uppercase;
    padding: 4px 16px;
    margin-bottom: 12px;
  }
  header h1 {
    font-family: 'Baloo 2', cursive;
    font-size: clamp(1.6rem, 5vw, 2.6rem);
    font-weight: 800;
    line-height: 1.15;
    text-shadow: 0 2px 12px rgba(0,0,0,.2);
  }
  header p {
    margin-top: 8px;
    opacity: .88;
    font-size: .95rem;
    font-weight: 600;
  }

  /* ─── PROGRESS BAR ─── */
  #progress-wrap {
    background: var(--white);
    padding: 14px 24px;
    box-shadow: 0 2px 8px rgba(0,0,0,.07);
    display: flex;
    align-items: center;
    gap: 14px;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  #progress-label { font-weight: 800; font-size: .85rem; white-space: nowrap; color: var(--red); }
  #progress-bar-outer {
    flex: 1;
    height: 12px;
    background: #f0e8e6;
    border-radius: 99px;
    overflow: hidden;
  }
  #progress-bar-inner {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, var(--red), var(--yellow));
    border-radius: 99px;
    transition: width .4s ease;
  }
  #score-live {
    font-weight: 800;
    font-size: .85rem;
    color: var(--text);
    white-space: nowrap;
  }

  /* ─── MAIN ─── */
  main {
    max-width: 820px;
    margin: 0 auto;
    padding: 28px 16px 60px;
  }

  /* ─── LESSON CHIP ─── */
  .lesson-chip {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: var(--red);
    color: var(--white);
    border-radius: 30px;
    padding: 4px 14px;
    font-size: .72rem;
    font-weight: 800;
    letter-spacing: .08em;
    text-transform: uppercase;
    margin-bottom: 10px;
  }

  /* ─── QUESTION CARD ─── */
  .q-card {
    background: var(--white);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: 26px 28px 22px;
    margin-bottom: 20px;
    border: 2px solid transparent;
    transition: border-color .25s;
  }
  .q-card.answered-correct { border-color: var(--green); }
  .q-card.answered-wrong   { border-color: var(--wrong); }

  .q-number {
    font-size: .72rem;
    font-weight: 800;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: .1em;
    margin-bottom: 6px;
  }
  .q-text {
    font-size: 1.05rem;
    font-weight: 700;
    line-height: 1.4;
    margin-bottom: 18px;
  }

  /* ─── OPTIONS ─── */
  .options { display: flex; flex-direction: column; gap: 10px; }
  .opt-btn {
    display: flex;
    align-items: center;
    gap: 12px;
    background: #faf5f4;
    border: 2px solid #eee;
    border-radius: 10px;
    padding: 12px 16px;
    cursor: pointer;
    font-family: 'Nunito', sans-serif;
    font-size: .95rem;
    font-weight: 600;
    color: var(--text);
    text-align: left;
    transition: background .15s, border-color .15s, transform .1s;
  }
  .opt-btn:hover:not(:disabled) {
    background: #fff0ed;
    border-color: var(--salmon);
    transform: translateX(4px);
  }
  .opt-btn:disabled { cursor: default; }

  .opt-letter {
    min-width: 30px;
    height: 30px;
    border-radius: 50%;
    background: #eeddd9;
    color: var(--red-dark);
    font-weight: 800;
    font-size: .8rem;
    display: flex; align-items: center; justify-content: center;
    transition: background .2s, color .2s;
    flex-shrink: 0;
  }

  .opt-btn.correct {
    background: var(--green-bg);
    border-color: var(--green);
  }
  .opt-btn.correct .opt-letter {
    background: var(--green);
    color: #fff;
  }
  .opt-btn.wrong {
    background: var(--wrong-bg);
    border-color: var(--wrong);
  }
  .opt-btn.wrong .opt-letter {
    background: var(--wrong);
    color: #fff;
  }

  /* ─── FEEDBACK ─── */
  .feedback {
    display: none;
    margin-top: 14px;
    padding: 10px 14px;
    border-radius: 10px;
    font-weight: 700;
    font-size: .9rem;
    align-items: center;
    gap: 8px;
  }
  .feedback.show { display: flex; }
  .feedback.ok  { background: var(--green-bg); color: #1a7d4e; }
  .feedback.bad { background: var(--wrong-bg);  color: #b03030; }

  /* ─── SUBMIT BTN ─── */
  #submit-wrap {
    text-align: center;
    margin-top: 10px;
  }
  #btn-submit {
    background: linear-gradient(135deg, var(--red-dark), var(--red));
    color: #fff;
    border: none;
    border-radius: 50px;
    padding: 16px 52px;
    font-family: 'Baloo 2', cursive;
    font-size: 1.2rem;
    font-weight: 700;
    cursor: pointer;
    box-shadow: 0 6px 24px rgba(232,64,42,.35);
    transition: transform .15s, box-shadow .15s;
  }
  #btn-submit:hover {
    transform: translateY(-2px);
    box-shadow: 0 10px 30px rgba(232,64,42,.45);
  }
  #btn-submit:active { transform: translateY(0); }
  #btn-submit:disabled { opacity: .5; cursor: default; transform: none; }

  /* ─── RESULTS ─── */
  #results-screen {
    display: none;
    text-align: center;
    padding: 20px 0 40px;
    animation: fadeUp .5s ease forwards;
  }
  @keyframes fadeUp {
    from { opacity:0; transform: translateY(30px); }
    to   { opacity:1; transform: translateY(0); }
  }

  .result-trophy {
    font-size: 5rem;
    margin-bottom: 8px;
    animation: bounce 1s ease 0.3s both;
  }
  @keyframes bounce {
    0%,100% { transform: translateY(0); }
    40%      { transform: translateY(-18px); }
    60%      { transform: translateY(-8px); }
  }

  .result-title {
    font-family: 'Baloo 2', cursive;
    font-size: 2rem;
    font-weight: 800;
    color: var(--red-dark);
    margin-bottom: 6px;
  }
  .result-score-circle {
    width: 140px;
    height: 140px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--red-dark), var(--red-light));
    color: #fff;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    margin: 20px auto;
    box-shadow: 0 8px 32px rgba(232,64,42,.4);
  }
  .result-score-num {
    font-family: 'Baloo 2', cursive;
    font-size: 2.6rem;
    font-weight: 800;
    line-height: 1;
  }
  .result-score-denom { font-size: .9rem; font-weight: 700; opacity: .85; }

  .result-msg {
    font-size: 1.1rem;
    font-weight: 700;
    max-width: 480px;
    margin: 0 auto 28px;
    color: var(--text);
    line-height: 1.5;
  }

  .lesson-summary {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 12px;
    margin-bottom: 30px;
  }
  .ls-chip {
    background: #fff;
    border-radius: 12px;
    padding: 12px 20px;
    box-shadow: var(--shadow);
    font-weight: 700;
    font-size: .85rem;
    color: var(--text);
    min-width: 140px;
  }
  .ls-chip span { display: block; font-size: 1.35rem; font-weight: 800; color: var(--red); }

  #btn-retry {
    background: var(--white);
    color: var(--red-dark);
    border: 2.5px solid var(--red);
    border-radius: 50px;
    padding: 13px 40px;
    font-family: 'Baloo 2', cursive;
    font-size: 1.1rem;
    font-weight: 700;
    cursor: pointer;
    transition: background .2s, color .2s;
  }
  #btn-retry:hover { background: var(--red); color: #fff; }

  /* ─── RESPONSIVE ─── */
  @media(max-width:560px) {
    .q-card { padding: 18px 16px 16px; }
    .opt-btn { font-size: .88rem; padding: 10px 12px; }
  }
</style>
</head>
<body>

<header>
  <div class="badge">🎓 Jasperactive · PowerPoint 365</div>
  <h1>Cuestionario de Certificación</h1>
  <p>Lecciones 1–4 · 30 preguntas · 3.° Básico</p>
</header>

<div id="progress-wrap">
  <span id="progress-label">0 / 30</span>
  <div id="progress-bar-outer"><div id="progress-bar-inner"></div></div>
  <span id="score-live">✅ 0 &nbsp; ❌ 0</span>
</div>

<main>
  <div id="quiz-container"></div>

  <div id="submit-wrap">
    <button id="btn-submit" disabled onclick="showResults()">Ver mi resultado final 🎯</button>
  </div>

  <div id="results-screen">
    <div class="result-trophy" id="trophy">🏆</div>
    <div class="result-title" id="result-title">¡Excelente trabajo!</div>
    <div class="result-score-circle">
      <span class="result-score-num" id="final-score">0</span>
      <span class="result-score-denom">de 30</span>
    </div>
    <p class="result-msg" id="result-msg"></p>
    <div class="lesson-summary" id="lesson-summary"></div>
    <button id="btn-retry" onclick="retryQuiz()">🔄 Intentar de nuevo</button>
  </div>
</main>

<script>
const QUESTIONS = [
  /* ── LECCIÓN 1: INTRODUCCIÓN ── */
  {
    lesson: 1, lessonName: "Introducción",
    q: "¿Cuál de las siguientes opciones permite crear una presentación nueva en blanco en PowerPoint 365?",
    opts: ["Archivo > Abrir", "Archivo > Nuevo > Presentación en blanco", "Insertar > Diapositiva", "Vista > Normal"],
    correct: 1
  },
  {
    lesson: 1, lessonName: "Introducción",
    q: "¿Dónde se encuentran las opciones para cambiar el tamaño de la diapositiva en PowerPoint 365?",
    opts: ["Pestaña Inicio > Diapositivas", "Pestaña Diseño > Tamaño de diapositiva", "Pestaña Insertar > Tamaño", "Pestaña Vista > Zoom"],
    correct: 1
  },
  {
    lesson: 1, lessonName: "Introducción",
    q: "¿Cuál es la extensión predeterminada de un archivo de PowerPoint 365?",
    opts: [".doc", ".xls", ".pptx", ".pdf"],
    correct: 2
  },
  {
    lesson: 1, lessonName: "Introducción",
    q: "¿Qué opción se debe usar para guardar una presentación de manera que sea compatible con versiones anteriores de PowerPoint?",
    opts: ["Guardar como PDF", "Guardar como PowerPoint 97-2003 (.ppt)", "Exportar como imagen", "Guardar en la nube"],
    correct: 1
  },
  {
    lesson: 1, lessonName: "Introducción",
    q: "¿Qué atajo de teclado se usa para guardar rápidamente una presentación en PowerPoint 365?",
    opts: ["Ctrl + P", "Ctrl + G", "Ctrl + S", "Ctrl + A"],
    correct: 2
  },
  {
    lesson: 1, lessonName: "Introducción",
    q: "¿Dónde se pueden modificar las propiedades de la presentación (como el autor y el título)?",
    opts: ["Pestaña Insertar > Encabezado", "Archivo > Información > Propiedades", "Pestaña Diseño > Temas", "Vista > Esquema"],
    correct: 1
  },
  {
    lesson: 1, lessonName: "Introducción",
    q: "¿Qué vista de PowerPoint muestra la presentación en pantalla completa, como la vería el público?",
    opts: ["Vista Normal", "Vista Esquema", "Vista Presentación con diapositivas", "Vista Clasificador"],
    correct: 2
  },
  {
    lesson: 1, lessonName: "Introducción",
    q: "¿Cuáles son los dos tamaños estándar de diapositiva disponibles en PowerPoint 365?",
    opts: ["Carta y Oficio", "Estándar (4:3) y Panorámica (16:9)", "A4 y A3", "Cuadrado y Rectangular"],
    correct: 1
  },

  /* ── LECCIÓN 2: TRABAJAR CON DIAPOSITIVAS ── */
  {
    lesson: 2, lessonName: "Trabajar con diapositivas",
    q: "¿Qué es un 'tema' en PowerPoint 365?",
    opts: ["Un tipo de animación", "Un conjunto de colores, fuentes y efectos de diseño predefinidos", "Una vista especial de la presentación", "Un tipo de gráfico"],
    correct: 1
  },
  {
    lesson: 2, lessonName: "Trabajar con diapositivas",
    q: "¿Dónde se encuentran los temas en PowerPoint 365?",
    opts: ["Pestaña Insertar > Temas", "Pestaña Diseño > Temas", "Pestaña Vista > Temas", "Pestaña Inicio > Temas"],
    correct: 1
  },
  {
    lesson: 2, lessonName: "Trabajar con diapositivas",
    q: "¿Qué es el 'patrón de diapositivas' en PowerPoint 365?",
    opts: ["Una plantilla que controla el formato y diseño de todas las diapositivas", "Un tipo de gráfico especial", "Una función para imprimir diapositivas", "Una herramienta para agregar texto"],
    correct: 0
  },
  {
    lesson: 2, lessonName: "Trabajar con diapositivas",
    q: "¿Desde qué pestaña se accede al patrón de diapositivas en PowerPoint 365?",
    opts: ["Inicio", "Insertar", "Vista", "Diseño"],
    correct: 2
  },
  {
    lesson: 2, lessonName: "Trabajar con diapositivas",
    q: "¿Qué permite el 'pie de página' en una presentación de PowerPoint?",
    opts: ["Agregar un fondo a las diapositivas", "Mostrar texto, fecha o número de diapositiva en la parte inferior", "Insertar imágenes decorativas", "Cambiar el color del texto principal"],
    correct: 1
  },
  {
    lesson: 2, lessonName: "Trabajar con diapositivas",
    q: "¿Cómo se duplica una diapositiva en PowerPoint 365?",
    opts: ["Clic derecho en la diapositiva > Duplicar diapositiva", "Insertar > Nueva diapositiva > Duplicar", "Archivo > Duplicar", "Vista > Copiar diapositiva"],
    correct: 0
  },
  {
    lesson: 2, lessonName: "Trabajar con diapositivas",
    q: "¿Qué vista permite reorganizar fácilmente el orden de las diapositivas en PowerPoint 365?",
    opts: ["Vista Normal", "Vista Esquema", "Vista Clasificador de diapositivas", "Vista Presentación"],
    correct: 2
  },
  {
    lesson: 2, lessonName: "Trabajar con diapositivas",
    q: "¿Qué son los 'diseños de diapositiva' en PowerPoint 365?",
    opts: ["Animaciones predeterminadas para las diapositivas", "Plantillas de disposición que determinan dónde se colocan los elementos en la diapositiva", "Tipos de transiciones entre diapositivas", "Fondos decorativos para la presentación"],
    correct: 1
  },

  /* ── LECCIÓN 3: TRABAJAR CON TEXTO ── */
  {
    lesson: 3, lessonName: "Trabajar con texto",
    q: "¿Qué permite ver la 'Vista Esquema' en PowerPoint 365?",
    opts: ["Solo las imágenes de la presentación", "El texto de los marcadores de posición de título y contenido de forma estructurada", "Los videos insertados en la presentación", "Los gráficos y tablas de la presentación"],
    correct: 1
  },
  {
    lesson: 3, lessonName: "Trabajar con texto",
    q: "¿Cuál es el atajo de teclado para copiar texto en PowerPoint 365?",
    opts: ["Ctrl + X", "Ctrl + V", "Ctrl + C", "Ctrl + Z"],
    correct: 2
  },
  {
    lesson: 3, lessonName: "Trabajar con texto",
    q: "¿Cuál es el atajo de teclado para cortar texto en PowerPoint 365?",
    opts: ["Ctrl + C", "Ctrl + X", "Ctrl + V", "Ctrl + D"],
    correct: 1
  },
  {
    lesson: 3, lessonName: "Trabajar con texto",
    q: "¿Cómo se activa el corrector ortográfico en PowerPoint 365?",
    opts: ["Inicio > Revisión", "Presionando la tecla F7 o desde Revisar > Ortografía", "Vista > Corrector", "Insertar > Texto > Ortografía"],
    correct: 1
  },
  {
    lesson: 3, lessonName: "Trabajar con texto",
    q: "¿Qué son las 'viñetas' en PowerPoint 365?",
    opts: ["Tipos de animación para texto", "Símbolos o caracteres que se colocan al inicio de cada elemento de una lista", "Formas decorativas que se insertan en la diapositiva", "Tipos de fuente especiales"],
    correct: 1
  },
  {
    lesson: 3, lessonName: "Trabajar con texto",
    q: "¿Desde qué pestaña se puede cambiar el formato del texto (negrita, cursiva, tamaño de fuente) en PowerPoint?",
    opts: ["Insertar", "Diseño", "Inicio", "Vista"],
    correct: 2
  },
  {
    lesson: 3, lessonName: "Trabajar con texto",
    q: "¿Qué es un 'cuadro de texto' en PowerPoint 365?",
    opts: ["Un tipo de tabla para organizar datos", "Un objeto que permite agregar texto en cualquier lugar de la diapositiva", "Un gráfico especial de texto", "Una imagen con texto incrustado"],
    correct: 1
  },
  {
    lesson: 3, lessonName: "Trabajar con texto",
    q: "¿Qué opción permite importar un esquema desde un archivo de texto (.txt o .docx) en PowerPoint?",
    opts: ["Insertar > Objeto", "Inicio > Pegar especial", "Archivo > Abrir > Examinar (seleccionando el archivo de texto)", "Vista > Esquema > Importar"],
    correct: 2
  },
  {
    lesson: 3, lessonName: "Trabajar con texto",
    q: "¿Qué permite el 'formato de párrafo' en PowerPoint 365?",
    opts: ["Solo cambiar el color del texto", "Ajustar la alineación, el interlineado y el espaciado del texto", "Insertar imágenes dentro del texto", "Cambiar el fondo de la diapositiva"],
    correct: 1
  },

  /* ── LECCIÓN 4: GRÁFICOS Y TABLAS ── */
  {
    lesson: 4, lessonName: "Gráficos y tablas",
    q: "¿Desde dónde se inserta un gráfico en PowerPoint 365?",
    opts: ["Inicio > Gráfico", "Insertar > Gráfico", "Diseño > Gráfico", "Vista > Gráfico"],
    correct: 1
  },
  {
    lesson: 4, lessonName: "Gráficos y tablas",
    q: "Cuando se inserta un gráfico en PowerPoint 365, ¿qué aplicación se abre para ingresar los datos?",
    opts: ["Word", "Access", "Excel", "Bloc de notas"],
    correct: 2
  },
  {
    lesson: 4, lessonName: "Gráficos y tablas",
    q: "¿Cómo se inserta una tabla en PowerPoint 365?",
    opts: ["Archivo > Insertar tabla", "Insertar > Tabla", "Diseño > Tabla", "Inicio > Tabla"],
    correct: 1
  },
  {
    lesson: 4, lessonName: "Gráficos y tablas",
    q: "¿Qué pestaña contextual aparece en la cinta de opciones cuando se selecciona una tabla en PowerPoint?",
    opts: ["Herramientas de imagen", "Herramientas de tabla (Diseño y Presentación)", "Herramientas de gráfico", "Herramientas de dibujo"],
    correct: 1
  },
  {
    lesson: 4, lessonName: "Gráficos y tablas",
    q: "¿Cómo se agrega una fila nueva al final de una tabla en PowerPoint 365?",
    opts: ["Clic derecho > Nueva fila", "Presionar Tab desde la última celda de la tabla", "Insertar > Fila nueva", "Diseño > Agregar fila"],
    correct: 1
  },
  {
    lesson: 4, lessonName: "Gráficos y tablas",
    q: "¿Qué opción permite cambiar el estilo visual (colores y bordes) de una tabla en PowerPoint 365?",
    opts: ["La pestaña contextual 'Diseño de tabla'", "La pestaña Inicio > Formato", "La pestaña Insertar > Estilo", "La pestaña Vista > Diseño"],
    correct: 0
  }
];

// ── STATE ──
let answers = new Array(QUESTIONS.length).fill(null);
let correctCount = 0;
let wrongCount = 0;

// ── BUILD QUIZ ──
function buildQuiz() {
  const container = document.getElementById('quiz-container');
  container.innerHTML = '';
  answers.fill(null);
  correctCount = 0; wrongCount = 0;
  updateProgress();

  let lastLesson = 0;

  QUESTIONS.forEach((qObj, idx) => {
    if (qObj.lesson !== lastLesson) {
      lastLesson = qObj.lesson;
      const chip = document.createElement('div');
      chip.className = 'lesson-chip';
      chip.innerHTML = `📂 Lección ${qObj.lesson}: ${qObj.lessonName}`;
      container.appendChild(chip);
    }

    const card = document.createElement('div');
    card.className = 'q-card';
    card.id = `card-${idx}`;

    const letters = ['A', 'B', 'C', 'D'];
    let optHTML = qObj.opts.map((opt, oi) => `
      <button class="opt-btn" data-q="${idx}" data-o="${oi}" onclick="selectAnswer(${idx},${oi})">
        <span class="opt-letter">${letters[oi]}</span>
        <span>${opt}</span>
      </button>
    `).join('');

    card.innerHTML = `
      <div class="q-number">Pregunta ${idx + 1}</div>
      <div class="q-text">${qObj.q}</div>
      <div class="options">${optHTML}</div>
      <div class="feedback" id="fb-${idx}"></div>
    `;
    container.appendChild(card);
  });

  document.getElementById('submit-wrap').style.display = 'flex';
  document.getElementById('submit-wrap').style.justifyContent = 'center';
  document.getElementById('results-screen').style.display = 'none';
  document.getElementById('btn-submit').disabled = true;
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// ── SELECT ANSWER ──
function selectAnswer(qIdx, optIdx) {
  if (answers[qIdx] !== null) return; // already answered

  const qObj = QUESTIONS[qIdx];
  answers[qIdx] = optIdx;
  const isCorrect = optIdx === qObj.correct;

  if (isCorrect) correctCount++; else wrongCount++;

  // Disable all buttons for this question
  document.querySelectorAll(`[data-q="${qIdx}"]`).forEach(btn => {
    btn.disabled = true;
    const o = parseInt(btn.getAttribute('data-o'));
    if (o === qObj.correct) btn.classList.add('correct');
    else if (o === optIdx)  btn.classList.add('wrong');
  });

  // Show feedback
  const fb = document.getElementById(`fb-${qIdx}`);
  if (isCorrect) {
    fb.className = 'feedback show ok';
    fb.innerHTML = '✅ ¡Correcto! Muy bien.';
  } else {
    const correctText = qObj.opts[qObj.correct];
    fb.className = 'feedback show bad';
    fb.innerHTML = `❌ Incorrecto. La respuesta correcta es: <strong>${correctText}</strong>`;
  }

  // Card border
  const card = document.getElementById(`card-${qIdx}`);
  card.classList.add(isCorrect ? 'answered-correct' : 'answered-wrong');

  updateProgress();

  // Enable submit when all answered
  const answered = answers.filter(a => a !== null).length;
  if (answered === QUESTIONS.length) {
    document.getElementById('btn-submit').disabled = false;
    document.getElementById('btn-submit').scrollIntoView({ behavior: 'smooth', block: 'center' });
  }
}

// ── PROGRESS ──
function updateProgress() {
  const answered = answers.filter(a => a !== null).length;
  const pct = (answered / QUESTIONS.length) * 100;
  document.getElementById('progress-bar-inner').style.width = pct + '%';
  document.getElementById('progress-label').textContent = `${answered} / ${QUESTIONS.length}`;
  document.getElementById('score-live').innerHTML = `✅ ${correctCount} &nbsp; ❌ ${wrongCount}`;
}

// ── SHOW RESULTS ──
function showResults() {
  document.getElementById('quiz-container').style.display = 'none';
  document.getElementById('submit-wrap').style.display = 'none';
  const results = document.getElementById('results-screen');
  results.style.display = 'block';

  document.getElementById('final-score').textContent = correctCount;
  const pct = (correctCount / QUESTIONS.length) * 100;

  let trophy, title, msg;
  if (pct === 100) {
    trophy = '🏆'; title = '¡Perfecto! ¡Eres un campeón!';
    msg = '¡Increíble! Respondiste correctamente todas las preguntas. ¡Estás más que listo para la certificación de PowerPoint 365!';
  } else if (pct >= 80) {
    trophy = '🥇'; title = '¡Excelente resultado!';
    msg = `¡Muy bien hecho! Obtuviste ${correctCount} de 30. Tienes un dominio sólido de PowerPoint 365. Repasa las preguntas que fallaste y estarás listo para certificarte.`;
  } else if (pct >= 60) {
    trophy = '🥈'; title = '¡Buen trabajo!';
    msg = `Obtuviste ${correctCount} de 30. ¡Vas por buen camino! Te recomendamos repasar las lecciones donde tuviste errores antes de presentar la certificación.`;
  } else if (pct >= 40) {
    trophy = '📚'; title = '¡Sigue practicando!';
    msg = `Obtuviste ${correctCount} de 30. Necesitas repasar más los temas. Vuelve a revisar las lecciones en Jasperactive y vuelve a intentarlo. ¡Tú puedes!`;
  } else {
    trophy = '💪'; title = '¡No te rindas!';
    msg = `Obtuviste ${correctCount} de 30. Es momento de repasar todas las lecciones desde el principio. ¡Cada intento te hace más fuerte!`;
  }

  document.getElementById('trophy').textContent = trophy;
  document.getElementById('result-title').textContent = title;
  document.getElementById('result-msg').textContent = msg;

  // Per-lesson summary
  const lessonData = {};
  QUESTIONS.forEach((q, i) => {
    if (!lessonData[q.lesson]) lessonData[q.lesson] = { name: q.lessonName, correct: 0, total: 0 };
    lessonData[q.lesson].total++;
    if (answers[i] === q.correct) lessonData[q.lesson].correct++;
  });

  const sumDiv = document.getElementById('lesson-summary');
  sumDiv.innerHTML = '';
  Object.entries(lessonData).forEach(([l, d]) => {
    const chip = document.createElement('div');
    chip.className = 'ls-chip';
    const emojis = ['','📋','🖼️','✍️','📊'];
    chip.innerHTML = `${emojis[l]} Lección ${l}<br><small>${d.name}</small><span>${d.correct}/${d.total}</span>`;
    sumDiv.appendChild(chip);
  });

  results.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

// ── RETRY ──
function retryQuiz() {
  document.getElementById('quiz-container').style.display = 'block';
  buildQuiz();
}

// ── INIT ──
buildQuiz();
</script>
